name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: recursive

      - name: Build submodule (before bun install to avoid @types/bun type pollution)
        working-directory: vscode-beancount-formatter
        run: npm install && npm run compile

      - uses: oven-sh/setup-bun@v2

      - run: bun install --ignore-scripts

      - run: bun run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: bunx semantic-release
